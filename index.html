<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>varshify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="light"]{
    --bg:#F5F3FB; --surface:#FFFFFF; --surface-2:#F0EDFA; --surface-3:#E6E1F6;
    --text:#1C1733; --text-2:#5D5778; --text-3:#9089AC; --border:#E7E3F5;
    --primary:#6D28D9; --primary-2:#4F46E5; --on-primary:#FFFFFF;
    --success:#0D9488; --success-bg:#E6F7F5; --warning:#D97706; --warning-bg:#FCF1DD;
    --danger:#E11D48; --danger-bg:#FCE7EC; --info:#2563EB; --info-bg:#E7EFFD;
    --shadow:0 10px 28px -12px rgba(76,29,149,0.22);
    --shadow-sm:0 2px 10px -4px rgba(76,29,149,0.12);
    --backdrop: rgba(20,14,40,0.5);
  }
  :root[data-theme="dark"]{
    --bg:#0F0B1E; --surface:#1B1632; --surface-2:#241D3F; --surface-3:#2D2550;
    --text:#F2F0FB; --text-2:#B6AED4; --text-3:#857CA6; --border:#332C58;
    --primary:#9568FA; --primary-2:#7C7CF5; --on-primary:#FFFFFF;
    --success:#2DD4BF; --success-bg:#10302C; --warning:#FBBF24; --warning-bg:#332708;
    --danger:#FB7185; --danger-bg:#3A1422; --info:#60A5FA; --info-bg:#0F2540;
    --shadow:0 10px 30px -10px rgba(0,0,0,0.6);
    --shadow-sm:0 2px 12px -4px rgba(0,0,0,0.4);
    --backdrop: rgba(0,0,0,0.6);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Outfit',sans-serif;}
  .phone-frame{
    max-width:430px; margin:0 auto; min-height:100vh; position:relative;
    background:var(--bg); overflow:hidden; display:flex; flex-direction:column;
  }
  @media (min-width:480px){
    body{ background:linear-gradient(160deg,#211a3d,#0d0a1c); display:flex; justify-content:center; padding:24px 0;}
    .phone-frame{ min-height:844px; height:844px; border-radius:40px; box-shadow:0 30px 70px -20px rgba(0,0,0,0.6); border:8px solid #15101f;}
  }
  ::-webkit-scrollbar{width:0;height:0;}
  button,input,select,textarea{font-family:inherit; font-size:inherit; color:inherit;}
  button{cursor:pointer;}
  a{color:inherit;}

  /* ---------- top bar ---------- */
  .topbar{
    padding:18px 18px 12px; display:flex; align-items:flex-start; justify-content:space-between;
    flex-shrink:0;
  }
  .topbar .greet-eyebrow{font-size:12px; color:var(--text-3); font-weight:600; letter-spacing:.02em;}
  .topbar h1{margin:2px 0 0; font-size:21px; font-weight:700;}
  .topbar-icons{display:flex; gap:8px;}
  .icon-btn{
    width:38px; height:38px; border-radius:12px; background:var(--surface);
    border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
    position:relative; box-shadow:var(--shadow-sm);
  }
  .icon-btn svg{width:18px; height:18px; stroke:var(--text-2);}
  .icon-btn .dot-badge{
    position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%;
    background:var(--danger); border:2px solid var(--surface);
  }
  .screen-header{
    padding:16px 18px 10px; display:flex; align-items:center; gap:10px; flex-shrink:0;
  }
  .back-btn{
    width:34px; height:34px; border-radius:10px; background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .back-btn svg{width:18px;height:18px;stroke:var(--text-2);}
  .screen-header h1{font-size:19px; font-weight:700; margin:0;}
  .screen-header .sub{font-size:12px; color:var(--text-3); margin-top:1px;}

  /* ---------- scroll area ---------- */
  .screen-content{
    flex:1; overflow-y:auto; padding:4px 18px 110px; position:relative;
    scroll-behavior:smooth;
  }

  /* ---------- generic ---------- */
  .section-title{display:flex; align-items:center; justify-content:space-between; margin:22px 0 10px;}
  .section-title h2{font-size:15px; font-weight:700; margin:0;}
  .section-title .see-all{font-size:12px; color:var(--primary); font-weight:600;}
  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:14px; margin-bottom:10px; box-shadow:var(--shadow-sm);
  }
  .row{display:flex; align-items:center;}
  .between{justify-content:space-between;}
  .gap8{gap:8px;} .gap10{gap:10px;} .gap6{gap:6px;}
  .muted{color:var(--text-3);}
  .text-2{color:var(--text-2);}
  .dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .badge{
    display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700;
    padding:3px 8px; border-radius:999px; letter-spacing:.01em; white-space:nowrap;
  }
  .badge.b-success{background:var(--success-bg); color:var(--success);}
  .badge.b-warning{background:var(--warning-bg); color:var(--warning);}
  .badge.b-danger{background:var(--danger-bg); color:var(--danger);}
  .badge.b-info{background:var(--info-bg); color:var(--info);}
  .badge.b-muted{background:var(--surface-3); color:var(--text-2);}

  .empty-state{
    text-align:center; padding:38px 16px; color:var(--text-3);
  }
  .empty-state svg{width:40px;height:40px; stroke:var(--text-3); margin-bottom:10px;}
  .empty-state .et{font-size:13.5px; font-weight:600; color:var(--text-2); margin-bottom:4px;}
  .empty-state .ed{font-size:12.5px; max-width:240px; margin:0 auto 14px;}

  .btn{
    border:none; border-radius:13px; padding:12px 16px; font-weight:600; font-size:14px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; width:100%;}
  .btn-outline{background:var(--surface); border:1px solid var(--border); color:var(--text); width:100%;}
  .btn-ghost{background:var(--surface-2); color:var(--text-2); width:100%;}
  .btn-danger-outline{background:var(--danger-bg); color:var(--danger); width:100%;}
  .btn-sm{padding:8px 12px; font-size:12.5px; border-radius:10px; width:auto;}

  .fab{
    position:absolute; right:18px; bottom:96px; width:54px; height:54px; border-radius:17px;
    background:linear-gradient(135deg,var(--primary),var(--primary-2)); box-shadow:0 10px 24px -6px rgba(109,40,217,0.55);
    display:flex; align-items:center; justify-content:center; z-index:5; border:none;
  }
  .fab svg{width:24px; height:24px; stroke:#fff; stroke-width:2.2;}

  /* ---------- bottom nav ---------- */
  .bottom-nav{
    flex-shrink:0; display:flex; background:var(--surface); border-top:1px solid var(--border);
    padding:8px 4px calc(8px + env(safe-area-inset-bottom,0px)); position:relative; z-index:10;
  }
  .nav-btn{
    flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center;
    gap:3px; padding:5px 0; color:var(--text-3);
  }
  .nav-btn svg{width:20px; height:20px; stroke:currentColor; stroke-width:1.8;}
  .nav-btn span{font-size:10.5px; font-weight:600;}
  .nav-btn.active{color:var(--primary);}

  /* ---------- stat grid ---------- */
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;}
  .stat-card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:13px; box-shadow:var(--shadow-sm);}
  .stat-card .sv{font-size:21px; font-weight:800; font-family:'Outfit',sans-serif;}
  .stat-card .sl{font-size:11px; color:var(--text-3); font-weight:600; margin-top:1px;}
  .stat-card .si{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
  .stat-card .si svg{width:15px;height:15px;}

  /* ---------- timeline (signature dashboard element) ---------- */
  .timeline{position:relative; padding-left:22px; margin-top:4px;}
  .timeline::before{content:''; position:absolute; left:5px; top:6px; bottom:6px; width:2px; background:var(--border);}
  .t-item{position:relative; padding-bottom:16px;}
  .t-item:last-child{padding-bottom:0;}
  .t-dot{position:absolute; left:-22px; top:3px; width:12px; height:12px; border-radius:50%; border:2.5px solid var(--surface); box-shadow:0 0 0 2px currentColor;}
  .t-time{font-size:11px; font-weight:700; color:var(--text-3); margin-bottom:3px;}
  .t-card{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:11px 13px; box-shadow:var(--shadow-sm);}
  .t-card .tt{font-weight:700; font-size:13.5px;}
  .t-card .tm{font-size:11.5px; color:var(--text-3); margin-top:2px;}

  /* ---------- subject chip ---------- */
  .subject-chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;}

  /* ---------- announcement ---------- */
  .announce{
    background:linear-gradient(135deg,var(--primary),var(--primary-2)); border-radius:16px; padding:14px;
    color:#fff; margin-top:14px; position:relative; overflow:hidden;
  }
  .announce .ax{position:absolute; top:8px; right:10px; opacity:.85;}
  .announce .ax svg{width:14px;height:14px; stroke:#fff;}
  .announce .al{font-size:10.5px; font-weight:700; opacity:.8; text-transform:uppercase; letter-spacing:.04em;}
  .announce .at{font-size:13.5px; font-weight:600; margin-top:4px; line-height:1.4; padding-right:14px;}

  /* ---------- segmented control ---------- */
  .segmented{display:flex; background:var(--surface-2); border-radius:13px; padding:4px; margin:14px 0;}
  .segmented button{flex:1; border:none; background:none; padding:9px 4px; border-radius:10px; font-weight:600; font-size:12.5px; color:var(--text-2);}
  .segmented button.active{background:var(--surface); color:var(--primary); box-shadow:var(--shadow-sm);}

  /* ---------- list item / card variants ---------- */
  .item-card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:13px; margin-bottom:9px; box-shadow:var(--shadow-sm);}
  .item-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .item-title{font-weight:700; font-size:14px; line-height:1.3;}
  .item-meta{font-size:11.5px; color:var(--text-3); margin-top:3px; display:flex; align-items:center; gap:5px; flex-wrap:wrap;}
  .checkbox{
    width:21px; height:21px; border-radius:7px; border:2px solid var(--border); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; background:var(--surface);
  }
  .checkbox.checked{background:var(--success); border-color:var(--success);}
  .checkbox svg{width:13px;height:13px; stroke:#fff; display:none;}
  .checkbox.checked svg{display:block;}
  .strike{text-decoration:line-through; color:var(--text-3);}

  /* ---------- more menu ---------- */
  .menu-item{
    display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:14px; margin-bottom:10px; box-shadow:var(--shadow-sm);
  }
  .menu-item .mi{width:42px; height:42px; border-radius:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .menu-item .mi svg{width:20px;height:20px;}
  .menu-item .mt{font-weight:700; font-size:14px;}
  .menu-item .md{font-size:11.5px; color:var(--text-3); margin-top:1px;}
  .menu-item .chev{margin-left:auto; width:16px; height:16px; stroke:var(--text-3); flex-shrink:0;}

  /* ---------- weekly timetable ---------- */
  .day-tabs{display:flex; gap:6px; overflow-x:auto; padding:2px 0 4px;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{
    flex-shrink:0; padding:9px 14px; border-radius:12px; background:var(--surface-2); border:1px solid transparent;
    font-weight:700; font-size:12.5px; color:var(--text-2); text-align:center; min-width:48px;
  }
  .day-tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff;}
  .day-tab .dn{font-size:9.5px; font-weight:600; opacity:.75; display:block; margin-top:1px;}
  .class-block{
    border-radius:14px; padding:12px 13px; margin-bottom:9px; border-left:4px solid; background:var(--surface);
    box-shadow:var(--shadow-sm);
  }
  .class-block .ct{font-weight:700; font-size:14px;}
  .class-block .cm{font-size:11.5px; color:var(--text-3); margin-top:3px; display:flex; gap:10px; flex-wrap:wrap;}
  .class-block .ctime{font-size:11px; font-weight:700; color:var(--primary); background:var(--surface-2); padding:3px 8px; border-radius:8px; display:inline-block; margin-bottom:6px;}

  /* ---------- calendar grid ---------- */
  .cal-nav{display:flex; align-items:center; justify-content:space-between; margin:14px 0 10px;}
  .cal-nav .cm-title{font-weight:700; font-size:15.5px;}
  .cal-nav button{width:32px;height:32px;border-radius:10px;background:var(--surface-2);border:none; display:flex;align-items:center;justify-content:center;}
  .cal-nav button svg{width:16px;height:16px;stroke:var(--text-2);}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center;}
  .cal-dow{font-size:10px; font-weight:700; color:var(--text-3); padding-bottom:4px;}
  .cal-day{
    aspect-ratio:1; border-radius:11px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:12.5px; font-weight:600; position:relative; background:var(--surface-2); color:var(--text-2);
  }
  .cal-day.muted-day{opacity:.3;}
  .cal-day.today{box-shadow:inset 0 0 0 2px var(--primary);}
  .cal-day.selected{background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff;}
  .cal-day .dots{display:flex; gap:2px; margin-top:2px; position:absolute; bottom:5px;}
  .cal-day .dots span{width:4px; height:4px; border-radius:50%;}

  /* ---------- attendance ring ---------- */
  .ring{width:58px; height:58px; border-radius:50%; position:relative; flex-shrink:0;}
  .ring-inner{
    position:absolute; inset:5px; border-radius:50%; background:var(--surface);
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; font-family:'Outfit',sans-serif;
  }

  /* ---------- modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:var(--backdrop); display:flex; align-items:flex-end; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .modal-backdrop.show{opacity:1; pointer-events:auto;}
  .sheet{
    width:100%; max-width:430px; background:var(--surface); border-radius:22px 22px 0 0; padding:8px 20px 24px;
    max-height:88vh; overflow-y:auto; transform:translateY(16px); transition:transform .22s ease;
  }
  .modal-backdrop.show .sheet{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; background:var(--border); border-radius:99px; margin:8px auto 14px;}
  .sheet-title{font-size:17px; font-weight:700; margin-bottom:14px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; padding:11px 13px; border-radius:12px; border:1.5px solid var(--border);
    background:var(--surface-2); color:var(--text); outline:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary);}
  .field textarea{resize:vertical; min-height:64px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .color-picker{display:flex; gap:8px; flex-wrap:wrap;}
  .color-swatch{width:30px; height:30px; border-radius:50%; border:2.5px solid transparent;}
  .color-swatch.sel{border-color:var(--text);}
  .pill-options{display:flex; gap:8px; flex-wrap:wrap;}
  .pill-opt{padding:8px 14px; border-radius:11px; background:var(--surface-2); border:1.5px solid transparent; font-weight:600; font-size:12.5px;}
  .pill-opt.sel{border-color:var(--primary); background:var(--info-bg); color:var(--primary);}
  .sheet-actions{display:flex; gap:10px; margin-top:6px;}

  /* ---------- toast ---------- */
  #toast{
    position:absolute; left:50%; bottom:96px; transform:translate(-50%,12px); background:var(--text); color:var(--bg);
    padding:10px 18px; border-radius:99px; font-size:12.5px; font-weight:600; opacity:0; transition:all .25s ease;
    pointer-events:none; z-index:200; white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translate(-50%,0);}

  /* ---------- lock screen ---------- */
  .lock-screen{
    position:absolute; inset:0; background:linear-gradient(160deg,var(--primary) 0%, var(--primary-2) 70%);
    display:flex; flex-direction:column; align-items:center; z-index:300; padding:0 24px;
  }
  .lock-logo{width:74px; height:74px; border-radius:22px; margin-top:14vh; box-shadow:0 14px 30px -8px rgba(0,0,0,0.4);}
  .lock-app-name{font-family:'Outfit',sans-serif; color:#fff; font-weight:700; font-size:19px; margin-top:14px; letter-spacing:.01em;}
  .lock-sub{color:rgba(255,255,255,0.75); font-size:12.5px; margin-top:4px;}
  .pin-dots{display:flex; gap:14px; margin:34px 0 30px;}
  .pin-dot{width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,0.6);}
  .pin-dot.filled{background:#fff;}
  .pin-dot.err{border-color:#FF8A8A; background:#FF8A8A;}
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:100%; max-width:280px;}
  .key{
    aspect-ratio:1; border-radius:50%; background:rgba(255,255,255,0.14); border:none; color:#fff;
    font-size:21px; font-weight:600; display:flex; align-items:center; justify-content:center;
  }
  .key:active{background:rgba(255,255,255,0.28);}
  .key.empty{background:none;}
  .key svg{width:20px; height:20px; stroke:#fff;}
  .lock-footer{margin-top:auto; padding-bottom:34px; text-align:center;}
  .lock-footer a{color:rgba(255,255,255,0.85); font-size:12.5px; font-weight:600; text-decoration:underline;}

  /* ---------- toggle switch ---------- */
  .switch{width:44px; height:26px; border-radius:99px; background:var(--surface-3); position:relative; flex-shrink:0; border:none;}
  .switch.on{background:linear-gradient(135deg,var(--primary),var(--primary-2));}
  .switch::after{content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .18s ease; box-shadow:0 1px 4px rgba(0,0,0,0.3);}
  .switch.on::after{left:21px;}

  .settings-group{margin-top:20px;}
  .settings-group h3{font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); margin:0 0 8px 4px; font-weight:700;}
  .settings-row{
    display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:13px 14px; margin-bottom:8px; box-shadow:var(--shadow-sm);
  }
  .settings-row .sr-t{font-weight:600; font-size:13.5px;}
  .settings-row .sr-d{font-size:11.5px; color:var(--text-3); margin-top:2px; max-width:230px;}

  .progress-bar{height:7px; border-radius:99px; background:var(--surface-3); overflow:hidden;}
  .progress-bar > div{height:100%; border-radius:99px;}

  .note-card{background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:9px; box-shadow:var(--shadow-sm);}
  .note-card .nt{font-weight:700; font-size:14px; margin-bottom:3px;}
  .note-card .nb{font-size:12.5px; color:var(--text-2); line-height:1.45; max-height:54px; overflow:hidden;}
  .note-card .nf{display:flex; justify-content:space-between; align-items:center; margin-top:9px;}

  .chip-row{display:flex; gap:7px; overflow-x:auto; padding:2px 0 12px;}
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0; padding:7px 13px; border-radius:99px; background:var(--surface-2); font-size:12px; font-weight:600; color:var(--text-2);}
  .chip.active{background:linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff;}

  .swipe-hint{font-size:11px;color:var(--text-3);text-align:center;margin-top:8px;}
  .loading-screen{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:500;}
  .spinner{width:30px;height:30px;border-radius:50%; border:3px solid var(--surface-3); border-top-color:var(--primary); animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .fade-in{animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6D28D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="varshify">
  <script>
    if ("serviceWorker" in navigator) {

let state = null;
let saveTimer = null;
const STORAGE_KEY = 'app-data';

function uid(){ return 'id_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function defaultData(){
  return {
    subjects: [],
    timetable: [],
    assignments: [],
    events: [],
    exams: [],
    notes: [],
    attendance: [],
    tasks: [],
    announcements: [],
    settings: { theme:'light', threshold:75, pinEnabled:false, pin:'', bioEnabled:false, reminderDays:[7,3,1], onboarded:false }
  };
}

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      return Object.assign(defaultData(), parsed);
    }
  }catch(e){ /* no data yet */ }
  return defaultData();
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 350);
}
async function saveData(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(state), false); }
  catch(e){ console.error('save failed', e); toast("Couldn't save — try again"); }
}

/* ================= NAV STATE ================= */
let nav = { tab:'home', plannerTab:'assignments', moreScreen:null, selectedDay: null, calMonth:new Date().getMonth(), calYear:new Date().getFullYear(), calSelected:null, noteFilter:'All' };
let authed = false;
let pinBuffer = '';
let pinMode = 'unlock'; // unlock | setNew | confirmNew
let pinFirstEntry = '';

/* ================= HELPERS ================= */
function getSubject(id){ return state.subjects.find(s=>s.id===id) || {id:null, name:'No subject', color:'#9089AC'}; }
function todayStr(){ return fmtISO(new Date()); }
function fmtISO(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }
function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDateNice(s){ const d=parseISO(s); return d.toLocaleDateString('en-US',{month:'short', day:'numeric'}); }
function fmtDateFull(s){ const d=parseISO(s); return d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric', year:'numeric'}); }
function daysUntil(s){ const d=parseISO(s); const t=parseISO(todayStr()); return Math.round((d-t)/86400000); }
function fmtTime(t){ if(!t) return ''; let [h,m]=t.split(':').map(Number); const ap=h>=12?'PM':'AM'; h=h%12; if(h===0)h=12; return h+':'+String(m).padStart(2,'0')+' '+ap; }
function todayDayIndex(){ const d=new Date().getDay(); return d===0? -1 : d-1; } // -1 sunday
function escapeHtml(str){ return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function greeting(){ const h=new Date().getHours(); if(h<12) return 'Good morning'; if(h<17) return 'Good afternoon'; return 'Good evening'; }

function urgencyColor(days){
  if(days<0) return 'danger'; if(days===0) return 'danger'; if(days<=3) return 'warning'; return 'info';
}
function urgencyLabel(days){
  if(days<0) return Math.abs(days)+'d overdue'; if(days===0) return 'Due today'; if(days===1) return 'Due tomorrow'; return 'In '+days+'d';
}

/* ================= ATTENDANCE HELPERS ================= */
function getAttendance(subjectId){
  let a = state.attendance.find(x=>x.subjectId===subjectId);
  if(!a){ a = {subjectId, total:0, attended:0}; state.attendance.push(a); }
  return a;
}
function attendancePct(a){ return a.total===0 ? 100 : Math.round((a.attended/a.total)*100); }

/* ================= TOAST ================= */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ================= MODAL ================= */
function openModal(html){
  let root = document.getElementById('modalRoot');
  if(!root){ root = document.createElement('div'); root.id='modalRoot'; document.getElementById('phoneFrame').appendChild(root); }
  root.innerHTML = '<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this) closeModal()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div>'+html+'</div></div>';
  requestAnimationFrame(()=>{ document.getElementById('modalBackdrop').classList.add('show'); });
}
function closeModal(){
  const bd = document.getElementById('modalBackdrop');
  if(!bd) return;
  bd.classList.remove('show');
  setTimeout(()=>{ const r=document.getElementById('modalRoot'); if(r) r.innerHTML=''; }, 200);
}

/* ================= APP SHELL ================= */
function setTab(tab){
  nav.tab = tab;
  if(tab==='more') nav.moreScreen = null;
  renderApp();
}
function renderApp(){
  const root = document.getElementById('appRoot');
  let content = '';
  if(nav.tab==='home') content = renderHome();
  else if(nav.tab==='timetable') content = renderTimetable();
  else if(nav.tab==='planner') content = renderPlanner();
  else if(nav.tab==='calendar') content = renderCalendarScreen();
  else if(nav.tab==='more') content = renderMore();

  root.innerHTML = `
    ${content}
    <div class="bottom-nav">
      ${navBtn('home','home','Home')}
      ${navBtn('timetable','timetable','Timetable')}
      ${navBtn('planner','planner','Planner')}
      ${navBtn('calendar','calendar','Calendar')}
      ${navBtn('more','more','More')}
    </div>
  `;
}
function navBtn(tab, ic, label){
  return `<button class="nav-btn ${nav.tab===tab?'active':''}" onclick="setTab('${tab}')">${icon(ic)}<span>${label}</span></button>`;
}

/* ================= HOME / DASHBOARD ================= */
function renderHome(){
  const dIdx = todayDayIndex();
  const todaysClasses = dIdx>=0 ? state.timetable.filter(c=>c.day===dIdx).sort((a,b)=>a.start.localeCompare(b.start)) : [];
  const pendingAssignments = state.assignments.filter(a=>a.status!=='Completed').sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const upcomingCIA = state.exams.filter(e=>e.examType==='CIA' && daysUntil(e.date)>=0).sort((a,b)=>a.date.localeCompare(b.date));
  const upcomingEnd = state.exams.filter(e=>e.examType==='EndSem' && daysUntil(e.date)>=0).sort((a,b)=>a.date.localeCompare(b.date));
  const pendingTasks = state.tasks.filter(t=>!t.completed);
  const overallAtt = computeOverallAttendance();
  const belowThreshold = state.attendance.filter(a=>a.total>0 && attendancePct(a) < state.settings.threshold);

  // today timeline items: classes + due-today assignments/tasks/exams
  let timelineItems = todaysClasses.map(c=>{
    const subj = getSubject(c.subjectId);
    return {time: fmtTime(c.start)+' – '+fmtTime(c.end), sortKey:c.start, title: subj.name, meta:[c.faculty, c.room].filter(Boolean).join(' • ') || 'Class', color: subj.color};
  });
  [...pendingAssignments.filter(a=>a.dueDate===todayStr()), ...state.exams.filter(e=>e.date===todayStr())].forEach(item=>{
    const isExam = !!item.examType;
    const subj = getSubject(item.subjectId);
    timelineItems.push({time:'Due today', sortKey:'24:'+(item.title||item.examType), title: isExam? subj.name+' — '+item.examType : item.title, meta: isExam? 'Exam' : 'Assignment due', color: isExam? '#E11D48' : '#D97706'});
  });
  state.tasks.filter(t=>!t.completed && t.dueDate===todayStr()).forEach(t=>{
    timelineItems.push({time:'Due today', sortKey:'25:'+t.title, title:t.title, meta:'Task', color:'#2563EB'});
  });
  timelineItems.sort((a,b)=> a.sortKey.localeCompare(b.sortKey));

  return `
  <div class="topbar">
    <div>
      <div class="greet-eyebrow">${greeting()} • ${new Date().toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric'})}</div>
      <h1>Your day</h1>
    </div>
    <div class="topbar-icons">
      <button class="icon-btn" onclick="openRemindersModal()">${icon('bell')}${(pendingAssignments.filter(a=>daysUntil(a.dueDate)<=1).length>0)?'<span class="dot-badge"></span>':''}</button>
      <button class="icon-btn" onclick="goSettings()">${icon('settings')}</button>
    </div>
  </div>
  <div class="screen-content fade-in">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="si" style="background:var(--info-bg)">${icon('task','style="stroke:var(--info)"')}</div>
        <div class="sv">${pendingTasks.length + pendingAssignments.length}</div>
        <div class="sl">Pending tasks</div>
      </div>
      <div class="stat-card">
        <div class="si" style="background:var(--success-bg)">${icon('attendance','style="stroke:var(--success)"')}</div>
        <div class="sv">${overallAtt===null?'—':overallAtt+'%'}</div>
        <div class="sl">Overall attendance</div>
      </div>
      <div class="stat-card">
        <div class="si" style="background:var(--warning-bg)">${icon('exam','style="stroke:var(--warning)"')}</div>
        <div class="sv">${[...upcomingCIA,...upcomingEnd].length ? daysUntil([...upcomingCIA,...upcomingEnd].sort((a,b)=>a.date.localeCompare(b.date))[0].date)+'d' : '—'}</div>
        <div class="sl">Next exam</div>
      </div>
      <div class="stat-card">
        <div class="si" style="background:var(--info-bg)">${icon('timetable','style="stroke:var(--info)"')}</div>
        <div class="sv">${todaysClasses.length}</div>
        <div class="sl">Classes today</div>
      </div>
    </div>

    ${belowThreshold.length>0 ? `
    <div class="card" style="border-color:var(--danger); margin-top:14px; background:var(--danger-bg);">
      <div class="row gap8">${icon('warn','style="stroke:var(--danger); width:18px;height:18px;flex-shrink:0;"')}
        <div>
          <div style="font-weight:700; font-size:13px; color:var(--danger);">Attendance below ${state.settings.threshold}%</div>
          <div style="font-size:11.5px; color:var(--text-2); margin-top:2px;">${belowThreshold.map(a=>getSubject(a.subjectId).name).join(', ')}</div>
        </div>
      </div>
    </div>` : ''}

    ${renderAnnouncements()}

    <div class="section-title"><h2>Today</h2>${dIdx<0?'<span class="muted" style="font-size:11.5px;">No classes Sunday</span>':''}</div>
    ${timelineItems.length===0 ? emptyState('home','Nothing scheduled today','Enjoy the free time, or add a class from Timetable.') : `
    <div class="timeline">
      ${timelineItems.map(it=>`
        <div class="t-item">
          <div class="t-dot" style="color:${it.color}"></div>
          <div class="t-time">${it.time}</div>
          <div class="t-card"><div class="tt">${escapeHtml(it.title)}</div><div class="tm">${escapeHtml(it.meta)}</div></div>
        </div>
      `).join('')}
    </div>`}

    <div class="section-title"><h2>Assignment deadlines</h2><span class="see-all" onclick="goPlanner('assignments')">See all</span></div>
    ${pendingAssignments.length===0 ? emptyState('planner','All caught up','No pending assignments right now.') :
      pendingAssignments.slice(0,3).map(a=>assignmentCard(a)).join('')}

    <div class="section-title"><h2>Upcoming exams</h2><span class="see-all" onclick="goPlanner('exams')">See all</span></div>
    ${[...upcomingCIA,...upcomingEnd].length===0 ? emptyState('exam','No exams scheduled','Add CIA or end-sem dates to track them here.') :
      [...upcomingCIA,...upcomingEnd].sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3).map(e=>examCard(e)).join('')}

    <div class="section-title"><h2>Attendance</h2><span class="see-all" onclick="goMore('attendance')">See all</span></div>
    ${state.subjects.length===0 ? emptyState('attendance','No subjects yet','Add subjects from Timetable to start tracking attendance.') : `
    <div class="card">
      ${state.subjects.slice(0,4).map(s=>{
        const a = getAttendance(s.id); const pct = attendancePct(a);
        const c = pct < state.settings.threshold ? 'var(--danger)' : pct < state.settings.threshold+10 ? 'var(--warning)' : 'var(--success)';
        return `<div class="row between" style="margin-bottom:10px;">
          <div class="row gap8"><span class="dot" style="background:${s.color}"></span><span style="font-size:12.5px; font-weight:600;">${escapeHtml(s.name)}</span></div>
          <div class="row gap6"><div class="progress-bar" style="width:70px;"><div style="width:${pct}%; background:${c};"></div></div><span style="font-size:11.5px; font-weight:700; color:${c};">${pct}%</span></div>
        </div>`;
      }).join('')}
    </div>`}
  </div>
  `;
}
function renderAnnouncements(){
  if(state.announcements.length===0){
    return `<div class="section-title" style="margin-top:18px;"><h2>Announcements</h2><span class="see-all" onclick="openAddAnnouncementModal()">+ Add</span></div>`;
  }
  return `
  <div class="section-title" style="margin-top:18px;"><h2>Announcements</h2><span class="see-all" onclick="openAddAnnouncementModal()">+ Add</span></div>
  ${state.announcements.slice().reverse().slice(0,2).map(an=>`
    <div class="announce">
      <div class="ax" onclick="dismissAnnouncement('${an.id}')">${icon('close')}</div>
      <div class="al">Announcement</div>
      <div class="at">${escapeHtml(an.text)}</div>
    </div>
  `).join('')}
  `;
}
function computeOverallAttendance(){
  const valid = state.attendance.filter(a=>a.total>0);
  if(valid.length===0) return null;
  const totalAll = valid.reduce((s,a)=>s+a.total,0);
  const attAll = valid.reduce((s,a)=>s+a.attended,0);
  return Math.round((attAll/totalAll)*100);
}
function emptyState(ic, title, desc){
  return `<div class="empty-state">${icon(ic)}<div class="et">${title}</div><div class="ed">${desc}</div></div>`;
}
function goSettings(){ nav.tab='more'; nav.moreScreen='settings'; renderApp(); }
function goPlanner(tab){ nav.tab='planner'; nav.plannerTab=tab; renderApp(); }
function goMore(screen){ nav.tab='more'; nav.moreScreen=screen; renderApp(); }

function openRemindersModal(){
  const items = [];
  state.assignments.filter(a=>a.status!=='Completed').forEach(a=>{
    const d = daysUntil(a.dueDate);
    if(d<=7) items.push({title:a.title, sub:'Assignment • '+getSubject(a.subjectId).name, days:d});
  });
  state.exams.forEach(e=>{
    const d = daysUntil(e.date);
    if(d>=0 && d<=7) items.push({title:getSubject(e.subjectId).name+' '+e.examType, sub:'Exam', days:d});
  });
  state.tasks.filter(t=>!t.completed && t.dueDate).forEach(t=>{
    const d = daysUntil(t.dueDate);
    if(d<=7) items.push({title:t.title, sub:'Task', days:d});
  });
  items.sort((a,b)=>a.days-b.days);
  openModal(`
    <div class="sheet-title">Reminders</div>
    ${items.length===0? emptyState('bell','No reminders','Nothing due in the next 7 days.') :
      items.map(it=>`<div class="item-card"><div class="item-top"><div><div class="item-title">${escapeHtml(it.title)}</div><div class="item-meta">${escapeHtml(it.sub)}</div></div><span class="badge b-${urgencyColor(it.days)}">${urgencyLabel(it.days)}</span></div></div>`).join('')}
    <div style="font-size:11px;color:var(--text-3);text-align:center;margin-top:6px;">Reminders shown ${state.settings.reminderDays.join('/')} days before due, in-app.</div>
  `);
}
function openAddAnnouncementModal(){

function saveAnnouncement(){

  scheduleSave(); closeModal(); renderApp(); toast('Announcement added');
}
function dismissAnnouncement(id){

}

    </div>
    <div class="field"><label>Day</label>

function saveClass(id){
  const subjectId = document.getElementById('cfSubject').value;
  const day = Number(document.getElementById('cfDay').value);
  const start = document.getElementById('cfStart').value;
  const end = document.getElementById('cfEnd').value;
  const faculty = document.getElementById('cfFaculty').value.trim();
  const room = document.getElementById('cfRoom').value.trim();
  if(!start || !end) return toast('Set start & end time');
  if(id){
    const c = state.timetable.find(x=>x.id===id);
    Object.assign(c, {subjectId, day, start, end, faculty, room});
  } else {
    state.timetable.push({id:uid(), subjectId, day, start, end, faculty, room});
  }
  nav.selectedDay = day;
  scheduleSave(); closeModal(); renderApp(); toast('Class saved');
}
function deleteClass(id){
  state.timetable = state.timetable.filter(c=>c.id!==id);
  scheduleSave(); closeModal(); renderApp(); toast('Class removed');
}

/* ================= SUBJECTS ================= */
function openSubjectModal(id){
  const s = id ? state.subjects.find(x=>x.id===id) : null;
  const chosenColor = s ? s.color : SUBJECT_COLORS[state.subjects.length % SUBJECT_COLORS.length];
  setTimeout(()=>{ window._tempColor = chosenColor; }, 0);
  openModal(`
    <div class="sheet-title">${s?'Edit subject':'Add subject'}</div>

      ${SUBJECT_COLORS.map(c=>`<div class="color-swatch ${c===chosenColor?'sel':''}" data-c="${c}" style="background:${c}" onclick="pickColor(this)"></div>`).join('')}
    </div></div>
    <div class="sheet-actions">
      ${s? `<button class="btn btn-danger-outline btn-sm" onclick="deleteSubject('${s.id}')">${icon('trash')}</button>`:''}
      <button class="btn btn-primary" onclick="saveSubject(${s?`'${s.id}'`:'null'})">Save</button>
    </div>
    ${state.subjects.length>0 ? `<div style="margin-top:18px;"><div style="font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:8px;">Your subjects</div>
    ${state.subjects.map(sub=>`<div class="row between" style="padding:8px 0;"><div class="row gap8"><span class="dot" style="background:${sub.color}"></span><span style="font-size:13px;">${escapeHtml(sub.name)}</span></div><span onclick="openSubjectModal('${sub.id}')" style="font-size:11.5px; color:var(--primary); font-weight:600;">Edit</span></div>`).join('')}
    </div>`:''}
  `);
}
function pickColor(el){
  document.querySelectorAll('#sfColors .color-swatch').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
  window._tempColor = el.dataset.c;
}
function saveSubject(id){
  const name = document.getElementById('sfName').value.trim();
  if(!name) return toast('Enter a subject name');
  const color = window._tempColor || SUBJECT_COLORS[0];
  if(id){
    const s = state.subjects.find(x=>x.id===id);
    Object.assign(s, {name, color});
  } else {
    state.subjects.push({id:uid(), name, color});
  }
  scheduleSave(); closeModal(); renderApp(); toast('Subject saved');
}
function deleteSubject(id){
  state.subjects = state.subjects.filter(s=>s.id!==id);
  state.timetable = state.timetable.filter(c=>c.subjectId!==id);
  state.attendance = state.attendance.filter(a=>a.subjectId!==id);
  scheduleSave(); closeModal(); renderApp(); toast('Subject deleted');
}

function taskCard(t){
  const d = t.dueDate ? daysUntil(t.dueDate) : null;
  return `
  <div class="item-card" onclick="openTaskModal('${t.id}')">
    <div class="item-top">
      <div class="row gap8" style="align-items:flex-start;">
        <button class="checkbox ${t.completed?'checked':''}" onclick="event.stopPropagation(); toggleTask('${t.id}')">${icon('check')}</button>

          ${t.dueDate? `<div class="item-meta">${fmtDateNice(t.dueDate)}${t.reminder?' • Reminder on':''}</div>`:''}

/* ================= ACADEMIC CALENDAR ================= */
function renderCalendarScreen(){
  const y = nav.calYear, m = nav.calMonth;
  const first = new Date(y,m,1);
  const startOffset = (first.getDay()+6)%7; // make Monday=0
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDaysInMonth = new Date(y,m,0).getDate();
  const cells = [];
  for(let i=startOffset-1;i>=0;i--) cells.push({d:prevDaysInMonth-i, muted:true});
  for(let d=1; d<=daysInMonth; d++) cells.push({d, muted:false});
  while(cells.length%7!==0) cells.push({d:cells.length, muted:true});

  const eventsByDate = {};
  state.events.forEach(e=>{ (eventsByDate[e.date] = eventsByDate[e.date]||[]).push(e); });
  state.assignments.forEach(a=>{ (eventsByDate[a.dueDate] = eventsByDate[a.dueDate]||[]).push({title:a.title, type:'Submission'}); });
  state.exams.forEach(ex=>{ (eventsByDate[ex.date] = eventsByDate[ex.date]||[]).push({title:getSubject(ex.subjectId).name+' '+ex.examType, type: ex.examType==='EndSem'?'EndSem':'CIA1'}); });

  const selDate = nav.calSelected || todayStr();
  const selEvents = eventsByDate[selDate] || [];

  return `
  <div class="screen-header"><div><h1>Academic calendar</h1><div class="sub">All your important dates</div></div></div>
  <div class="screen-content fade-in">
    <div class="cal-nav">
      <button onclick="calMonthShift(-1)">${icon('chevron','style="transform:rotate(180deg)"')}</button>
      <div class="cm-title">${first.toLocaleDateString('en-US',{month:'long', year:'numeric'})}</div>
      <button onclick="calMonthShift(1)">${icon('chevron')}</button>
    </div>
    <div class="cal-grid">
      ${['M','T','W','T','F','S','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(c=>{
        if(c.muted) return `<div class="cal-day muted-day">${c.d}</div>`;
        const iso = y+'-'+String(m+1).padStart(2,'0')+'-'+String(c.d).padStart(2,'0');
        const evs = eventsByDate[iso]||[];
        const isToday = iso===todayStr();
        const isSel = iso===selDate;
        return `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" onclick="calSelectDay('${iso}')">
          ${c.d}
          ${evs.length>0?`<div class="dots">${evs.slice(0,3).map(e=>`<span style="background:${isSel?'#fff':(EVENT_TYPES.find(t=>t.v===e.type)||{c:'#888'}).c}"></span>`).join('')}</div>`:''}
        </div>`;
      }).join('')}
    </div>

    <div class="section-title"><h2>${fmtDateFull(selDate)}</h2></div>
    ${selEvents.length===0? emptyState('calendar','No events', 'Tap + to add something on this date.') :
      selEvents.map(e=>{
        const t = EVENT_TYPES.find(x=>x.v===e.type) || {l:e.type, c:'#888'};
        return `<div class="card row gap10"><span class="dot" style="background:${t.c}"></span><div><div style="font-weight:600; font-size:13px;">${escapeHtml(e.title)}</div><div style="font-size:11.5px; color:var(--text-3);">${t.l}</div></div></div>`;
      }).join('')}
  </div>
  <button class="fab" onclick="openEventModal()">${icon('plus')}</button>
  `;
}
function calMonthShift(n){
  nav.calMonth += n;
  if(nav.calMonth<0){nav.calMonth=11; nav.calYear--;}
  if(nav.calMonth>11){nav.calMonth=0; nav.calYear++;}
  renderApp();
}
function calSelectDay(iso){ nav.calSelected = iso; renderApp(); }
function openEventModal(){
  openModal(`
    <div class="sheet-title">Add calendar event</div>
    <div class="field"><label>Title</label><input id="efEvTitle" placeholder="e.g. Project review - Phase 1"></div>
    <div class="field"><label>Type</label><select id="efEvType">${EVENT_TYPES.map(t=>`<option value="${t.v}">${t.l}</option>`).join('')}</select></div>
    <div class="field"><label>Date</label><input type="date" id="efEvDate" value="${nav.calSelected||todayStr()}"></div>
    <div class="sheet-actions"><button class="btn btn-primary" onclick="saveEvent()">Save</button></div>
  `);

function saveEvent(){

  const type = document.getElementById('efEvType').value;

function toggleTheme(){

function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.settings.theme);
}
function togglePinLock(){
  if(state.settings.pinEnabled){
    state.settings.pinEnabled = false; state.settings.pin='';
    scheduleSave(); renderApp(); toast('PIN lock turned off');
  } else {
    startSetPin();
  }
}
function startSetPin(){
  pinMode='setNew'; pinBuffer=''; pinFirstEntry='';
  renderLock(true);
}
function toggleBio(){
  state.settings.bioEnabled = !state.settings.bioEnabled;
  scheduleSave(); renderApp();
  toast(state.settings.bioEnabled? 'Fingerprint unlock enabled' : 'Fingerprint unlock disabled');
}
function toggleReminderDay(d){
  const idx = state.settings.reminderDays.indexOf(d);
  if(idx>-1) state.settings.reminderDays.splice(idx,1); else state.settings.reminderDays.push(d);
  state.settings.reminderDays.sort((a,b)=>b-a);
  scheduleSave(); renderApp();
}
function updateThreshold(v){
  state.settings.threshold = Math.min(100, Math.max(0, parseInt(v)||0));
  scheduleSave(); renderApp(); toast('Threshold updated');
}
function exportBackup(){
  try{
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'varshify-backup-'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Backup downloaded');
  }catch(e){ toast('Could not export backup'); }
}
function restoreBackup(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      state = Object.assign(defaultData(), data);
      applyTheme(); scheduleSave(); renderApp(); toast('Backup restored');
    }catch(e){ toast('Invalid backup file'); }
  };
  reader.readAsText(file);
}
function exportNotes(){
  if(state.notes.length===0) return toast('No notes to export');
  try{
    const text = state.notes.map(n=>'# '+n.title+' ('+n.category+')\\n'+n.content+'\\n').join('\\n---\\n\\n');
    const blob = new Blob([text], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'varshify-notes.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Notes exported');
  }catch(e){ toast('Could not export notes'); }
}
function confirmResetAll(){

    <div style="font-size:13px; color:var(--text-2); margin-bottom:16px;">This permanently deletes every subject, class, assignment, exam, note and task. This can't be undone.</div>

      <button class="btn btn-danger-outline" onclick="resetAll()">Reset everything</button>

  `);
}

}

  root.innerHTML = `
  <div class="lock-screen">
    <img src="${LOGO_B64}" class="lock-logo">
    <div class="lock-app-name">varshify</div>
    <div class="lock-sub">${subText}</div>
    ${dotsHtml}
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" onclick="pinPress('${n}')">${n}</button>`).join('')}
      ${(pinMode==='unlock' && state.settings.bioEnabled) ? `<button class="key" onclick="bioUnlock()">${icon('fingerprint')}</button>` : `<div class="key empty"></div>`}
      <button class="key" onclick="pinPress('0')">0</button>
      <button class="key" onclick="pinPress('back')">${icon('back')}</button>
    </div>
    <div class="lock-footer">
      ${(pinMode==='unlock')? `<a onclick="resetPinFlow()">Forgot PIN? Reset lock</a>` : overlay? `<a onclick="cancelSetPin()">Cancel</a>` : ''}
    </div>
  </div>
  `;
}
function pinPress(k){
  if(k==='back'){ pinBuffer = pinBuffer.slice(0,-1); updateDots(); return; }
  if(pinBuffer.length>=4) return;
  pinBuffer += k;
  updateDots();
  if(pinBuffer.length===4){ setTimeout(handlePinComplete, 150); }
}
function updateDots(){
  document.querySelectorAll('#pinDots .pin-dot').forEach((d,i)=>{
    d.classList.toggle('filled', i<pinBuffer.length);
    d.classList.remove('err');
  });
}
function shakeError(){
  document.querySelectorAll('#pinDots .pin-dot').forEach(d=>d.classList.add('err'));
  const dots = document.getElementById('pinDots');
  dots.style.transition='transform .08s'; let n=0;
  const iv = setInterval(()=>{ dots.style.transform = 'translateX('+(n%2===0?-6:6)+'px)'; n++; if(n>5){clearInterval(iv); dots.style.transform='translateX(0)';} },60);
}
function handlePinComplete(){
  if(pinMode==='unlock'){
    if(pinBuffer===state.settings.pin){
      authed = true;
      document.getElementById('lockRoot').remove();
      renderApp();
    } else {
      shakeError();
      setTimeout(()=>{ pinBuffer=''; updateDots(); }, 350);
    }
  } else if(pinMode==='setNew'){
    pinFirstEntry = pinBuffer; pinBuffer=''; pinMode='confirmNew';
    renderLock(true);
  } else if(pinMode==='confirmNew'){
    if(pinBuffer===pinFirstEntry){
      state.settings.pin = pinBuffer; state.settings.pinEnabled = true;
      authed = true; scheduleSave();
      const lr = document.getElementById('lockRoot'); if(lr) lr.remove();
      renderApp(); toast('PIN lock enabled');
    } else {
      shakeError();
      setTimeout(()=>{ pinMode='setNew'; pinBuffer=''; pinFirstEntry=''; renderLock(true); }, 400);
    }
  }
}
function bioUnlock(){
  toast('Scanning...');
  setTimeout(()=>{
    authed = true;
    const lr = document.getElementById('lockRoot'); if(lr) lr.remove();
    renderApp(); toast('Unlocked');
  }, 700);
}
function resetPinFlow(){
  openModal(`
    <div class="sheet-title">Reset PIN lock?</div>
    <div style="font-size:13px; color:var(--text-2); margin-bottom:16px;">This turns off the PIN lock so you can get back into the app. You can set a new PIN afterwards from Settings.</div>
    <div class="sheet-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmResetPin()">Reset lock</button>
    </div>
  `);
}
function confirmResetPin(){
  state.settings.pinEnabled=false; state.settings.pin=''; authed=true;
  scheduleSave(); closeModal();
  const lr = document.getElementById('lockRoot'); if(lr) lr.remove();
  renderApp(); toast('Lock removed — set a new PIN anytime in Settings');
}
function cancelSetPin(){
  pinMode='unlock'; pinBuffer='';
  const lr = document.getElementById('lockRoot'); if(lr) lr.remove();
  renderApp();
}

/* ================= ONBOARDING (first run) ================= */
function maybeShowOnboarding(){
  if(state.settings.onboarded) return;
  openModal(`
    <div style="text-align:center; padding:6px 0 4px;">
      <img src="${LOGO_B64}" style="width:64px;height:64px;border-radius:18px; margin-bottom:14px;">
      <div class="sheet-title" style="margin-bottom:6px;">Welcome to varshify</div>
      <div style="font-size:13px; color:var(--text-2); line-height:1.55; margin-bottom:20px;">Your offline academic organizer. Start by adding your subjects and weekly timetable — everything else builds on top of that.</div>
      <button class="btn btn-primary" onclick="finishOnboarding()">Get started</button>
    </div>
  `);
}
function finishOnboarding(){
  state.settings.onboarded = true;
  scheduleSave(); closeModal();
}

/* ================= BOOT ================= */
async function boot(){
  state = await loadData();
  applyTheme();
  if(state.settings.pinEnabled){
    pinMode='unlock'; pinBuffer='';
    renderApp();
    renderLock(false);
  } else {
    authed = true;
    renderApp();
    maybeShowOnboarding();
  }
}
boot();
</script>
</body>
</html>
